<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Game</title>
<style>
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #111;
  color: white;
  font-family: Arial;
}

canvas {
  background: black;
  margin-top: 10px;
}

.controls {
  margin-top: 15px;
  display: grid;
  grid-template-columns: repeat(3, 60px);
  gap: 10px;
}

button {
  height: 60px;
  font-size: 20px;
  border: none;
  border-radius: 10px;
}

.empty { visibility: hidden; }
</style>
</head>
<body>

<h2>Snake Game 🐍</h2>
<canvas id="game" width="300" height="300"></canvas>

<div class="controls">
  <div class="empty"></div>
  <button onclick="setDirection('up')">↑</button>
  <div class="empty"></div>

  <button onclick="setDirection('left')">←</button>
  <button onclick="setDirection('down')">↓</button>
  <button onclick="setDirection('right')">→</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const grid = 15;
let snake = [{x:150, y:150}];
let dx = grid;
let dy = 0;
let count = 0;
let speed = 8;

let food = {
  x: Math.floor(Math.random()*20)*grid,
  y: Math.floor(Math.random()*20)*grid
};

function setDirection(dir){
  if(dir==='left' && dx===0){dx=-grid;dy=0;}
  if(dir==='up' && dy===0){dx=0;dy=-grid;}
  if(dir==='right' && dx===0){dx=grid;dy=0;}
  if(dir==='down' && dy===0){dx=0;dy=grid;}
}

function loop(){
  requestAnimationFrame(loop);

  if(++count < speed) return;
  count = 0;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  let head = {
    x: snake[0].x + dx,
    y: snake[0].y + dy
  };

  // wall wrap
  if(head.x < 0) head.x = canvas.width - grid;
  if(head.x >= canvas.width) head.x = 0;
  if(head.y < 0) head.y = canvas.height - grid;
  if(head.y >= canvas.height) head.y = 0;

  snake.unshift(head);

  if(head.x === food.x && head.y === food.y){
    food.x = Math.floor(Math.random()*20)*grid;
    food.y = Math.floor(Math.random()*20)*grid;
  } else {
    snake.pop();
  }

  // food
  ctx.fillStyle = "red";
  ctx.fillRect(food.x, food.y, grid-2, grid-2);

  // snake
  snake.forEach((cell, index) => {

    if(index === 0){
      // head
      ctx.fillStyle = "#00ff00";
      ctx.beginPath();
      ctx.arc(cell.x + grid/2, cell.y + grid/2, grid/2, 0, Math.PI*2);
      ctx.fill();

      // eyes
      ctx.fillStyle = "black";
      ctx.beginPath();
      ctx.arc(cell.x + 5, cell.y + 5, 2, 0, Math.PI*2);
      ctx.arc(cell.x + 10, cell.y + 5, 2, 0, Math.PI*2);
      ctx.fill();

    } else {
      // body
      ctx.fillStyle = "#66ff66";
      ctx.beginPath();
      ctx.arc(cell.x + grid/2, cell.y + grid/2, grid/2.5, 0, Math.PI*2);
      ctx.fill();
    }

    // self collision
    for(let i=index+1;i<snake.length;i++){
      if(cell.x === snake[i].x && cell.y === snake[i].y){
        snake = [{x:150,y:150}];
        dx = grid;
        dy = 0;
      }
    }
  });
}

requestAnimationFrame(loop);

// swipe control
let startX=0,startY=0;

canvas.addEventListener("touchstart",e=>{
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

canvas.addEventListener("touchend",e=>{
  let dxSwipe = e.changedTouches[0].clientX - startX;
  let dySwipe = e.changedTouches[0].clientY - startY;

  if(Math.abs(dxSwipe) > Math.abs(dySwipe)){
    if(dxSwipe > 0) setDirection('right');
    else setDirection('left');
  } else {
    if(dySwipe > 0) setDirection('down');
    else setDirection('up');
  }
});
</script>

</body>
</html>
